name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            nasm

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build release binary
        run: cargo build -p brother-shell --release

      - name: Package release
        run: |
          mkdir -p release/brother-assistant
          cp target/release/brother-shell release/brother-assistant/brother-assistant
          cp -r dist release/brother-assistant/dist
          cp assets/icon.png release/brother-assistant/icon.png
          cat > release/brother-assistant/brother-assistant.desktop << 'EOF'
          [Desktop Entry]
          Name=Brother Assistant
          Comment=AI Assistant for Linux
          Exec=brother-assistant
          Icon=brother-assistant
          Type=Application
          Categories=Utility;
          EOF
          cd release && tar -czf brother-assistant-linux-x86_64.tar.gz brother-assistant/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/brother-assistant-linux-x86_64.tar.gz
          generate_release_notes: true
