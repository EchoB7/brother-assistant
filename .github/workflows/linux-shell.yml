name: Linux Shell

on:
  workflow_dispatch:
  push:
    paths:
      - "brother-core/**"
      - "brother-shell/**"
      - ".github/workflows/linux-shell.yml"
  pull_request:
    paths:
      - "brother-core/**"
      - "brother-shell/**"
      - ".github/workflows/linux-shell.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux GUI deps
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libgl1-mesa-dev libasound2-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build Linux Shell
        run: cargo build -p brother-shell