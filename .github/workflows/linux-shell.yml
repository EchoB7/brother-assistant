name: Linux Shell

on:
  workflow_dispatch:
  push:
    paths:
      - "brother-core/**"
      - "brother-shell/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/linux-shell.yml"
  pull_request:
    paths:
      - "brother-core/**"
      - "brother-shell/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/linux-shell.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            nasm
      - name: Build frontend
        run: npm ci && npm run build
      - name: Build Linux Shell
        run: cargo build -p brother-shell